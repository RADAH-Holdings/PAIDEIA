# Runs on every PR. App jobs activate automatically once backend/ and frontend/ exist (Wave 1+).
name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs:
    name: Spec layout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify canonical docs and tasks
        run: |
          set -euo pipefail
          test -f AGENTS.md
          test -f docs/fsd.md
          test -f docs/tsd.md
          test -f docs/design-system.md
          test -f tasks/README.md
          test -f tasks/phase-01.md
          echo "Spec layout OK"

  backend:
    name: Backend
    runs-on: ubuntu-latest
    if: hashFiles('backend/requirements.txt') != ''
    env:
      DJANGO_SECRET_KEY: ci-test-secret-key
      PAIDEIA_TEST_DB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Lint
        working-directory: backend
        run: ruff check .
      - name: Migration check
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run
      - name: Unit + integration tests
        working-directory: backend
        run: pytest -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    if: hashFiles('frontend/package.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint + types
        working-directory: frontend
        run: npm run lint && npm run typecheck
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Tests
        working-directory: frontend
        run: npm test
