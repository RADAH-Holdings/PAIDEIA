# Fallback if you prefer Nixpacks over Dockerfile (set builder = "NIXPACKS" in railway.toml).

[phases.setup]
nixPkgs = ["python312"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "gunicorn paideia.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:${PORT:-8000}"
