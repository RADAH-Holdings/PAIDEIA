# Used when this service's Root Directory is set to /backend in Railway.
# In the service settings, set "Config file path" to /backend/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = ["python", "manage.py", "migrate", "--noinput"]
healthcheckPath = "/api/v1/health/async"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
